<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ella Matrix Controller</title>
    <style>
        body { background: #0a0a0f; color: #00d4ff; font-family: 'Courier New', monospace; text-align: center; }
        .logic-shield { border: 1px solid #00d4ff; padding: 20px; margin: 50px auto; width: 300px; box-shadow: 0 0 15px #00d4ff; }
        button { background: transparent; color: #00d4ff; border: 1px solid #00d4ff; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #00d4ff; color: #000; }
    </style>
</head>
<body>
    <div class="logic-shield">
        <h2>Ella Core</h2>
        <p>Status: <span id="status">Standby</span></p>
        <button onclick="startRoutine()">Initialize Routine</button>
    </div>

    <script type="module">
        import { saveEvolutionStats } from './index.json'; // Linked to your Firebase module

        window.startRoutine = async () => {
            document.getElementById('status').innerText = "Deploying Noise...";
            
            // 1. Start Meta Noise (Visual/Audio cue)
            console.log("396Hz Frequency Active.");
            
            // 2. Open Routines
            window.open('https://mail.google.com/mail/u/0/#inbox', '_blank'); // Check Emails
            
            // 3. Log Evolution to Firebase
            await saveEvolutionStats("Nicholai_Architect", 10, 5);
            
            document.getElementById('status').innerText = "Sync Complete: L-Signals Sent";
        };
    </script>
</body>
</html>
