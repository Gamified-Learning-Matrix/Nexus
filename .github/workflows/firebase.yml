name: Build, Validate, and Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/firebase.yml
      - Assets/**
      - MinistryPortal/**
      - arcade/**
      - cname
      - ella-routine.html
      - index.html
      - index.json
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify deploy content exists
        run: |
          test -f index.html
          test -f ella-routine.html
          test -f index.json
          test -f cname
          test -d arcade

      - name: Check for placeholder content
        run: |
          mapfile -d '' -t deployable_paths < <(
            find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.json' \) -print0
          )
          deployable_paths+=(arcade)
          if grep -RInE "lorem ipsum|coming soon|todo|placeholder" "${deployable_paths[@]}"; then
            echo "Placeholder content found in deployable content"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMAZING_GRACE_HL_BBEAA }}
          projectId: amazing-grace-hl-bbeaa
          channelId: live
