name: Build, Validate, and Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Verify dist exists
        run: |
          test -d dist
          test -f dist/index.html

      - name: Verify critical pages exist
        run: |
          test -f dist/index.html
          test -f dist/arcade/index.html
          test -f dist/stories/index.html
          test -f dist/manifest.json

      - name: Check for placeholder content
        run: |
          if grep -RInE "lorem ipsum|coming soon|todo|placeholder" dist; then
            echo "Placeholder content found in dist/"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist

  deploy:
    needs: build_and_validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Verify downloaded dist
        run: |
          test -d dist
          test -f dist/index.html

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMAZING_GRACE_HL_BBEAA }}
          projectId: amazing-grace-hl-bbeaa
          channelId: live
